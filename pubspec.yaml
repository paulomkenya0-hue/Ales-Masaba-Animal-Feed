name: ales_masaba_feed
description: "Ales Masaba Animal Feed - Mfumo wa Kusimamia Biashara ya Vyakula vya Mifugo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local database (100% offline)
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Security
  crypto: ^3.0.3
  local_auth: ^2.2.0
  shared_preferences: ^2.2.3

  # UI / Charts
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Receipts / Reports export
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.3
  share_plus: ^9.0.0

  # Optional hardware (future ready)
  mobile_scanner: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/logo.png
  #   - assets/icons/
