name: ales_masaba_feed
description: "Ales Masaba Animal Feed - Mfumo wa Kusimamia Biashara ya Vyakula vya Mifugo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # Local Database (SQLite)
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Security & Authentication
  crypto: ^3.0.6
  # local_auth: ^2.1.6  # ← IMESHUKA (ilikuwa 2.3.0) - inafanya kazi na SDK 34
  shared_preferences: ^2.5.3

  # Firebase (Auth + Firestore + Offline Sync)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  connectivity_plus: ^6.1.0

  # Charts & UI
  fl_chart: ^0.68.0
 # google_fonts: ^6.3.1
  intl: ^0.20.2

  # PDF & Printing (VERSION ZIMESHUKA KWA SABABU SDK 34)
  pdf: ^3.10.4       # ← IMESHUKA (ilikuwa 3.11.3)
  printing: ^5.11.1  # ← IMESHUKA (ilikuwa 5.14.2)
  excel: ^4.0.6
  share_plus: ^12.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  # Barcode Scanner
  # mobile_scanner: ^7.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/icon.png

flutter:
  uses-material-design: true
  assets:
    # - assets/  # (Fungua kama una assets zingine)
