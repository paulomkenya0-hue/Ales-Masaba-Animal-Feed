name: ales_masaba_feed
description: "Ales Masaba Animal Feed - Mfumo wa Kusimamia Biashara ya Vyakula vya Mifugo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  provider: ^6.1.5

  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  crypto: ^3.0.6
  local_auth: ^2.3.0
  shared_preferences: ^2.5.3

  fl_chart: ^1.0.0
  google_fonts: ^6.3.1
  intl: ^0.20.2

  pdf: ^3.11.3
  printing: ^5.14.2
  excel: ^4.0.6
  share_plus: ^12.0.0

  mobile_scanner: ^7.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/icon.png

flutter:
  uses-material-design: true
