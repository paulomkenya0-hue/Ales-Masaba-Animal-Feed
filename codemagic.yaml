workflows:
  ales-masaba-feed-android:
    name: Ales Masaba Animal Feed - Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.alesmasaba.feed"
    scripts:
      - name: Pakua Vifurushi (flutter pub get)
        script: |
          flutter pub get
      - name: Tengeneza Aikoni ya Programu
        script: |
          dart run flutter_launcher_icons
      - name: Jenga APK (Release)
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
