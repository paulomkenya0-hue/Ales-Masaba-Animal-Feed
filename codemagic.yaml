workflows:
  ales-masaba-feed-android:
    name: Ales Masaba Animal Feed - Android Build
    max_build_duration: 45

    environment:
      flutter: stable  # ← BADILISHA! (ilikuwa "3.35.2")
      java: 17         # ← Ongeza Java version

      vars:
        PACKAGE_NAME: "com.alesmasaba.feed"

    scripts:
      - name: Flutter Version
        script: flutter --version

      - name: Clean
        script: flutter clean

      - name: Download Packages
        script: flutter pub get

      - name: Generate Launcher Icons
        script: dart run flutter_launcher_icons

      - name: Build APK
        script: |
          flutter build apk --release
          # Au jenga split APKs (ndogo)
          # flutter build apk --release --split-per-abi

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - paulomkenyao@gmail.com
        notify:
          success: true
          failure: true
